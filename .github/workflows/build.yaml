---
name: build
on:
  push:
    branches:
      - master
    tags:
      - "*"
  pull_request:
jobs:
  cache-cargo-bun:
    name: warm dependencies cache
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: cache cargo and bun
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun
            ~/.cargo
            ~/.rustup
          key: setup-${{ hashFiles('scripts/cache-cargo-bun.sh') }}
      - name: setup dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: bash scripts/cache-cargo-bun.sh
  build:
    name: build ${{ matrix.target }} artifacts
    runs-on: ubuntu-24.04
    needs: cache-cargo-bun
    permissions:
      contents: write
    env:
      DIST: /tmp/opencode-dist
      REPO: /tmp/opencode
    strategy:
      fail-fast: false
      matrix:
        target: [linux, windows]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: set opencode version
        run: >-
          echo "OPENCODE_VERSION=$(cat opencode-ref)" >> "$GITHUB_ENV"
      - name: clone opencode
        run: >-
          git clone --depth 1 --branch "$(cat opencode-ref)" \
            https://github.com/anomalyco/opencode.git "$REPO"
      - name: apply patches
        run: >-
          bash scripts/patch.sh "$REPO"
          patches/common patches/${{ matrix.target }}
      - name: restore cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.bun
            ~/.cargo
            ~/.rustup
          key: setup-${{ hashFiles('scripts/cache-cargo-bun.sh') }}
      - name: prepare build environment
        run: bash scripts/prepare.sh
      - name: build CLI
        run: bash scripts/build-cli.sh "$REPO" "$DIST" ${{ matrix.target }}
      - name: build desktop installer
        if: matrix.target == 'windows'
        run: bash scripts/build-desktop.sh "$REPO" "$DIST" "$DIST"
      - name: upload release artifacts
        uses: ncipollo/release-action@v1
        with:
          name: >-
            ${{ github.ref_type == 'tag'
              && format('opencode {0}', github.ref_name)
              || format('branch [{0}] binaries', github.head_ref == '' && github.ref_name || github.head_ref) }}
          draft: ${{ github.ref_type != 'tag' }}
          allowUpdates: true
          tag: ${{ github.ref_type == 'tag' && github.ref_name || 'v999' }}
          artifacts: "${{ env.DIST }}/*"
          body: >-
            ${{ github.ref_type == 'tag'
              && format('opencode build {0}', github.ref_name)
              || format('branch [{0}] opencode build from recent commit', github.head_ref == '' && github.ref_name || github.head_ref) }}
